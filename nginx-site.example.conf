# Ejemplo para Hostinger VPS (Ubuntu + Nginx)
# Copie el contenido del bloque server a /etc/nginx/sites-available/elpatio
# y ajuste server_name y la ruta root.

server {
    listen 80;
    server_name su-dominio.com www.su-dominio.com;
    root /var/www/elpatio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
